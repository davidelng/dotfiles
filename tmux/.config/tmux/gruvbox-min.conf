color_fg_0="#fbf1c7"
color_fg_1="#ebdbb2"
color_fg_2="#d5c4a1"
color_fg_3="#bdae93"
color_bg_0="#282828"
color_bg_0_soft="#32302f"
color_bg_0_hard="#1d2021"
color_bg_1="#3c3836"
color_bg_2="#504945"
color_bg_3="#665c54"
color_bg_4="#7c6f64"

color_red="#cc241d"
color_orange="#d65d0e"
color_yellow="#d79921"
color_green="#98971a"
color_cyan="#689d6a"
color_blue="#458588"
color_purple="#b16286"
color_gray="#928374"

color_red_light="#fb4934"
color_orange_light="#fe8019"
color_yellow_light="#fabd2f"
color_green_light="#b8bb26"
color_cyan_light="#8ec07c"
color_blue_light="#83a598"
color_purple_light="#d3869b"
color_gray_light="#a89984"

# status
set -g status "on"
set -g status-position "top"
set -g status-bg $color_bg_0_hard
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# messages
set -g message-style "fg=$color_fg_1,bg=$color_bg_1,align=centre"
set -g message-command-style "fg=$color_fg_1,bg=$color_bg_1,align=centre"

# panes
set -g pane-border-style fg=$color_bg_0
set -g pane-active-border-style fg=$color_bg_1

# windows
setw -g window-status-activity-style fg=$color_fg_1,bg=$color_bg_1,none
setw -g window-status-separator ""
setw -g window-status-style fg=$color_fg_1,bg=$color_bg_1,none

# statusline
# set -g status-left "#{?client_prefix,#[fg=#$color_bg_1#,bg=#$color_red],#[fg=#$color_bg_1#,bg=#$color_green]}  #S "
set -g status-left ""
set -g status-right ""

# window-status
setw -g window-status-format "#[bg=#$color_bg_0_hard,fg=#$color_fg_1] #I #W "
setw -g window-status-current-format "#[bg=#$color_fg_1,fg=#$color_bg_0_hard] #I #W "

